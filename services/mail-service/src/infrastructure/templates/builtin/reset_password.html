<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto">
    <h1 style="color: #dc2626">Đặt lại mật khẩu</h1>
    <p>Xin chào {{ full_name }},</p>
    <p>Bạn đã yêu cầu đặt lại mật khẩu. Nhấn nút bên dưới:</p>
    <a
      href="{{ reset_link }}"
      style="display: inline-block; padding: 12px 24px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px"
    >
      Đặt lại mật khẩu
    </a>
    <p style="margin-top: 16px">Link sẽ hết hạn sau <strong>{{ expires_in_minutes }}</strong> phút.</p>
    <p>Nếu bạn không yêu cầu, hãy bỏ qua email này.</p>
    <hr style="border: 1px solid #e5e7eb" />
    <p style="color: #6b7280; font-size: 12px">Đây là email tự động, vui lòng không trả lời.</p>
  </body>
</html>
