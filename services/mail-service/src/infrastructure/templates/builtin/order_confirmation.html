<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto">
    <h1 style="color: #16a34a">Xác nhận đơn hàng #{{ order_id }}</h1>
    <p>Xin chào {{ full_name }},</p>
    <p>Đơn hàng của bạn đã được đặt thành công.</p>
    <table style="width: 100%; border-collapse: collapse; margin: 16px 0">
      <tr style="background: #f3f4f6">
        <th style="padding: 8px; text-align: left">Mã đơn</th>
        <td style="padding: 8px">{{ order_id }}</td>
      </tr>
      <tr>
        <th style="padding: 8px; text-align: left">Tổng tiền</th>
        <td style="padding: 8px">{{ total }}</td>
      </tr>
    </table>
    <p>Chúng tôi sẽ thông báo khi đơn hàng được giao.</p>
    <hr style="border: 1px solid #e5e7eb" />
    <p style="color: #6b7280; font-size: 12px">Đây là email tự động, vui lòng không trả lời.</p>
  </body>
</html>
