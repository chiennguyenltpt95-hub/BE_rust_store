services:
  postgres:
    image: postgres:16-alpine
    container_name: be_store_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nats:
    image: nats:2-alpine
    container_name: be_store_nats
    ports:
      - "4222:4222"
      - "8222:8222" # monitoring

volumes:
  pgdata:
